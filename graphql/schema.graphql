type Mutation {
    createCustomerEvent(input: CreateCustomerEventInput!): Event!
        @guard(with: ["customer_jwt", "customer"])
        @field(resolver: "App\\GraphQL\\Mutations\\CustomerEventMutation@create")

    cancelCustomerEvent(event_id: ID!): Event!
        @guard(with: ["customer_jwt", "customer"])
        @field(resolver: "App\\GraphQL\\Mutations\\CustomerEventMutation@cancel")

    resendVerificationEmail(email: String!): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\CustomerVerificationMutation@resend")

    verifyEmailAddress(hash_key: String!): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\CustomerVerificationMutation@verify")

    resetPassword(email: String!): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\CustomerVerificationMutation@resetPassword")

    changePassword(
        token: String!
